name: Lint, Typecheck and Test
on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true
      - name: Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Dependencies
        run: pip install -r requirements.txt
      - name: Run ty
        uses: JacobCoffee/ty-action@v1
        with:
          args: 'check'
      - name: Format
        if: ${{ !cancelled() }}
        run: ruff format --diff
      - name: Lint
        if: ${{ !cancelled() }}
        run: ruff check --output-format=github
  
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true      
      - name: Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Dependencies
        run: pip install -r requirements.txt
      - name: Test
        run: python -m pytest tests -vs
