name: Lint, Typecheck and Test
on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: true
      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Dependencies
        run: pip install -r requirements.txt          
      - name: Typecheck
        if: ${{ !cancelled() }}
        run: ty check --project .
      - name: Format
        if: ${{ !cancelled() }}
        run: ruff format --diff
      - name: Lint
        if: ${{ !cancelled() }}
        run: ruff check --output-format=github
  
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: true      
      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Dependencies
        run: pip install -r requirements.txt
      - name: Test
        run: python -m pytest tests -vs
